<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-label="Academic AI hero background">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#1b263b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="36"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>

  <g opacity="0.18" stroke="#93c5fd" fill="none">
    <path d="M0 140 C 300 60, 620 220, 960 140 C 1280 60, 1600 220, 1920 140" stroke-width="2"/>
    <path d="M0 300 C 300 220, 620 380, 960 300 C 1280 220, 1600 380, 1920 300" stroke-width="2"/>
    <path d="M0 460 C 300 380, 620 540, 960 460 C 1280 380, 1600 540, 1920 460" stroke-width="2"/>
    <path d="M0 620 C 300 540, 620 700, 960 620 C 1280 540, 1600 700, 1920 620" stroke-width="2"/>
  </g>

  <circle cx="360" cy="260" r="140" fill="#3b82f6" opacity="0.25" filter="url(#blur)"/>
  <circle cx="1520" cy="760" r="180" fill="#10b981" opacity="0.2" filter="url(#blur)"/>

  <g transform="translate(980,180)">
    <rect x="0" y="0" width="700" height="420" rx="24" fill="#0b1220" opacity="0.65" stroke="#334155"/>
    <rect x="40" y="50" width="620" height="70" rx="14" fill="#111827" stroke="#334155"/>
    <rect x="40" y="150" width="620" height="210" rx="14" fill="#111827" stroke="#334155"/>
    <line x1="80" y1="85" x2="500" y2="85" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
    <line x1="80" y1="200" x2="580" y2="200" stroke="#60a5fa" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
    <line x1="80" y1="245" x2="560" y2="245" stroke="#34d399" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
    <line x1="80" y1="290" x2="520" y2="290" stroke="#93c5fd" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
  </g>

  <g transform="translate(170,710)">
    <text x="0" y="0" fill="#e2e8f0" font-family="Georgia, 'Times New Roman', serif" font-size="66" font-weight="700">AcademicRAG</text>
    <text x="0" y="60" fill="#cbd5e1" font-family="Verdana, sans-serif" font-size="28">Privacy-aware document intelligence for education</text>
  </g>
</svg>